<!DOCTYPE html>
<html lang="en">
<head>

<title>TCO Tracker — Sign in</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f4;--card:#ffffff;--text:#1c1c1a;--muted:#6b6b68;--border:rgba(0,0,0,0.12);--blue:#1c69d4}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--card:#242422;--text:#f0ede8;--muted:#9a9893;--border:rgba(255,255,255,0.1)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:2.5rem 2rem;max-width:380px;width:100%;text-align:center}
.logo{margin-bottom:1.5rem}
.logo svg{width:56px;height:56px}
h1{font-size:22px;font-weight:500;margin-bottom:6px}
.sub{font-size:14px;color:var(--muted);margin-bottom:2rem;line-height:1.5}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border:0.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:15px;font-weight:500;cursor:pointer;transition:background 0.15s}
.google-btn:hover{background:var(--bg)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.error{margin-top:1rem;font-size:13px;color:#b91c1c;background:#fef2f2;padding:10px 14px;border-radius:8px;display:none}
.footer{margin-top:2rem;font-size:12px;color:var(--muted)}
</style>
</head>

  </div>

  <h1>TCO Tracker</h1>
  <p class="sub">Track the true cost of owning your vehicle.<br>Sign in to access your garage.</p>

  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>

    Continue with Google
  </button>

  <div class="error" id="error-msg"></div>

  <div class="footer">Access is by invitation only.<br>Contact the app owner to request access.</div>
</div>

<script>
const SUPABASE_URL = 'https://zmlwcswvjbfayzjjcywz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ovKoCEQA_7nVYA13Hs1BVA_MtyoZQvx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signInWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/auth/callback'
    }
  });
  if (error) {
    const el = document.getElementById('error-msg');
    el.textContent = error.message;
    el.style.display = 'block';
  }
}

// If already logged in, redirect to app
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/';
});
</script>
